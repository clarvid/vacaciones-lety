<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Cuenta regresiva - Vacaciones de Lety</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    body { font-family: system-ui, Arial, sans-serif; background:#fff0f6; color:#b30059; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
    .card { text-align:center; background:#fff; border:2px solid #ffb6d5; padding:20px 28px; border-radius:12px; box-shadow:0 6px 18px rgba(179,0,89,0.06); max-width:760px; width:90%; }
    h1 { margin:0 0 10px; font-size:20px; color:#ff2d89; }
    .count { font-size:36px; font-weight:700; margin:12px 0; color:#d1006f; }
    .note { font-size:14px; color:#8b0b4f; margin-top:8px; }
    .started { margin-top:8px; font-size:15px; color:#8b0b4f; font-weight:600; }
    .progress-wrap { margin-top:18px; }
    .progress { position:relative; width:100%; height:18px; background:#ffeef6; border-radius:9px; overflow:hidden; box-shadow:inset 0 1px 0 rgba(255,255,255,0.6); }
    .fill { height:100%; width:0%; background:linear-gradient(90deg,#ff9ccf,#ff4da6); transition: width 0.5s ease; }
    .unicorn { position:absolute; top:50%; transform:translate(-50%,-50%); left:0%; font-size:20px; pointer-events:none; }
    .unicorn svg { width:20px; height:20px; display:block; }
    .progress-label { margin-top:6px; font-size:13px; color:#8b0b4f; text-align:center; }

    /* Flip clock styles */
    .units { display:flex; gap:14px; align-items:center; justify-content:center; margin-top:8px; flex-wrap:nowrap; }
    .unit { display:flex; flex-direction:column; align-items:center; }
    .unit-label { font-size:12px; color:#8b0b4f; margin-bottom:6px; }
    .days-num { font-size:28px; font-weight:700; color:#d1006f; background:#fff; border:2px solid #ffd1e6; padding:6px 10px; border-radius:8px; box-shadow:0 6px 12px rgba(179,0,89,0.06); }
    .digits { display:flex; gap:8px; height:72px; align-items:center; }
    .digit { width:56px; height:72px; position:relative; perspective:900px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
    .flip-card { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition: transform 0.6s cubic-bezier(.2,.8,.2,1); transform-origin:center center; }
    .face { position:absolute; left:0; top:0; width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:22px; background:#fff; border-radius:8px; border:1px solid #ffd1e6; box-shadow:0 4px 10px rgba(179,0,89,0.06); backface-visibility:hidden; }
    .face.front { transform:rotateX(0deg); z-index:2; }
    .face.back { transform:rotateX(180deg); }
    /* flip downwards from the middle to look like a page falling */
    .flip-card.flip { transform:rotateX(-180deg); z-index:3; }
    .sep { font-size:28px; color:#ff4da6; margin:0 8px; font-weight:800; display:flex; align-items:center; height:72px; }
    .unit-label { margin-top:8px; font-size:13px; text-align:center; }
    .unit { min-width:120px; display:flex; flex-direction:column; align-items:center; }
  </style>
</head>
<body>
  <div class="card">
    <!-- <h1>Vacaciones de Lety — 11 de mayo de 2026</h1> -->
    <h1>VACACIONES</h1>
    <div class="started">La cuenta atras ha comenzado faltan</div>
    <div id="count" class="count">
      <div class="units">
        <div class="unit">
          <div class="digits" data-unit="days">
            <div class="digit"><div class="flip-card"><div class="face front">0</div><div class="face back">0</div></div></div>
            <div class="digit"><div class="flip-card"><div class="face front">0</div><div class="face back">0</div></div></div>
          </div>
          <div class="unit-label">Días</div>
        </div>
        <div class="sep">:</div>
        <div class="unit">
          <div class="digits" data-unit="hours">
            <div class="digit"><div class="flip-card"><div class="face front">0</div><div class="face back">0</div></div></div>
            <div class="digit"><div class="flip-card"><div class="face front">0</div><div class="face back">0</div></div></div>
          </div>
          <div class="unit-label">Horas</div>
        </div>
        <div class="sep">:</div>
        <div class="unit">
          <div class="digits" data-unit="minutes">
            <div class="digit"><div class="flip-card"><div class="face front">0</div><div class="face back">0</div></div></div>
            <div class="digit"><div class="flip-card"><div class="face front">0</div><div class="face back">0</div></div></div>
          </div>
          <div class="unit-label">Minutos</div>
        </div>
      </div>
    </div>
    <div class="progress-wrap" aria-hidden="false">
      <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div class="fill" id="progressFill"></div>
        <div class="unicorn" id="unicorn" aria-hidden="true" style="left:0%;">
          <svg width="48" height="40" viewBox="0 0 1280 724" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="display:block;">
 <metadata>Created by potrace 1.15, written by Peter Selinger 2001-2017</metadata>
 <g class="layer">
  <title>Layer 1</title>
  <g fill="#66D0BC" id="svg_1" transform="translate(0.000000,724.000000) scale(0.100000,-0.100000)" stroke="#3A8B95" stroke-width="20">
   <path d="m1200,7229c-30,-4 -74,-15 -97,-23c-39,-14 -364,-251 -362,-265c0,-3 776,-493 1723,-1089l1724,-1083l367,-375c202,-206 366,-376 364,-378c-2,-2 -236,-47 -519,-101c-283,-53 -631,-119 -773,-146c-143,-27 -264,-49 -271,-49c-7,0 -222,226 -479,502c-285,307 -491,520 -528,547c-75,54 -216,128 -262,136c-35,7 -336,-40 -348,-53c-3,-4 14,-225 37,-492c24,-267 42,-492 41,-501c-2,-18 3,-20 -832,376c-264,125 -507,236 -540,247c-135,44 -332,14 -407,-62c-21,-21 -38,-46 -38,-57c0,-12 223,-228 641,-619c352,-329 655,-611 672,-626l32,-27l-39,-32c-50,-42 -76,-99 -76,-171c0,-51 3,-59 30,-82c51,-42 195,-77 365,-88l40,-3l312,-415c171,-228 322,-423 334,-432c32,-27 161,-25 235,3c108,40 105,34 185,379c39,168 72,306 73,308c2,1 99,-5 217,-13c353,-24 765,-35 1319,-35c687,0 980,12 1503,61c120,11 229,19 243,17c18,-2 155,-117 415,-348l388,-345l1,-947c0,-522 2,-948 4,-948c2,0 104,9 226,20c241,22 298,36 375,91c25,18 63,58 83,89c44,66 13,-1 730,1565c504,1100 581,1261 602,1267c14,4 84,14 155,23c300,38 858,140 1295,236c1377,305 2214,666 2396,1033c36,74 39,86 39,166c0,76 -3,92 -33,152c-62,126 -162,183 -482,277c-269,79 -291,87 -466,170c-175,83 -233,98 -429,111c-294,20 -523,-21 -865,-155c-74,-29 -144,-55 -155,-59c-11,-4 -114,-25 -230,-47c-115,-22 -363,-69 -550,-104c-1056,-199 -1355,-255 -1373,-255c-11,0 -316,115 -678,256c-2365,919 -4352,1691 -5713,2220c-505,196 -492,193 -621,173z" id="svg_2"/>
  </g>
 </g>
</svg>
        </div>
      </div>
      <div id="progressLabel" class="progress-label">Calculando progreso...</div>
    </div>
  </div>

  <script>
    const target = new Date(2026, 4, 11, 0, 0, 0); // mes 4 = mayo (0-indexado)
    const el = document.getElementById('count');
    // Fecha de inicio para calcular el progreso. Cambia aquí si quieres otra fecha de inicio.
    const startDate = new Date(2026, 0, 1, 0, 0, 0); // por defecto: 1 de enero de 2026
    const progressFill = document.getElementById('progressFill');
    const unicorn = document.getElementById('unicorn');
    const progressLabel = document.getElementById('progressLabel');

    // flip-clock containers (days, hours, minutes)
    const unitContainers = {
      days: document.querySelector('[data-unit="days"]'),
      hours: document.querySelector('[data-unit="hours"]'),
      minutes: document.querySelector('[data-unit="minutes"]')
    };

    // set to true to visualize progress bar at 50% (debug); set false for real calculation
    const visualizeHalf = false;

    function flipDigit(cardEl, newChar) {
      const front = cardEl.querySelector('.face.front');
      const back = cardEl.querySelector('.face.back');
      if (!front || !back) return;
      if (front.textContent === newChar) return;
      back.textContent = newChar;
      cardEl.classList.add('flip');
      function onEnd(e) {
        if (e.propertyName !== 'transform') return;
        cardEl.classList.remove('flip');
        front.textContent = newChar;
        cardEl.removeEventListener('transitionend', onEnd);
      }
      cardEl.addEventListener('transitionend', onEnd);
    }

    function setUnit(unitName, valueStr) {
      const container = unitContainers[unitName];
      if (!container) return;
      valueStr = String(valueStr).padStart(2, '0');
      const digitCards = container.querySelectorAll('.digit .flip-card');
      for (let i = 0; i < Math.min(digitCards.length, valueStr.length); i++) {
        flipDigit(digitCards[i], valueStr[i]);
      }
    }

    function update() {
      const now = new Date();
      let diff = target - now;
      if (diff <= 0) {
        setUnit('days', '00');
        setUnit('hours', '00');
        setUnit('minutes', '00');
        clearInterval(timer);
        if (progressFill) progressFill.style.width = '100%';
        if (unicorn) unicorn.style.left = '100%';
        if (progressLabel) progressLabel.textContent = '100% recorrido';
        return;
      }
      const days = Math.floor(diff / (1000*60*60*24));
      diff -= days * (1000*60*60*24);
      const hours = Math.floor(diff / (1000*60*60));
      diff -= hours * (1000*60*60);
      const minutes = Math.floor(diff / (1000*60));
      diff -= minutes * (1000*60);

      // update displays (DD:HH:MM)
      setUnit('days', String(days).padStart(2,'0'));
      setUnit('hours', String(hours).padStart(2,'0'));
      setUnit('minutes', String(minutes).padStart(2,'0'));

      // actualizar barra de progreso
      if (progressFill && unicorn && progressLabel) {
        let percent;
        if (visualizeHalf) {
          percent = 50;
        } else {
          const total = target - startDate;
          const elapsed = now - startDate;
          percent = total > 0 ? Math.floor((elapsed / total) * 100) : 0;
          if (percent < 0) percent = 0;
          if (percent > 100) percent = 100;
        }
        progressFill.style.width = percent + '%';
        unicorn.style.left = percent + '%';
        progressLabel.textContent = percent + '% recorrido';
      }
    }

    // init: set initial values without flipping twice
    (function init() {
      const now = new Date();
      let diff = target - now;
      if (diff < 0) diff = 0;
      const days = Math.floor(diff / (1000*60*60*24));
      diff -= days * (1000*60*60*24);
      const hours = String(Math.floor(diff / (1000*60*60))).padStart(2,'0');
      diff -= hours * (1000*60*60);
      const minutes = String(Math.floor(diff / (1000*60))).padStart(2,'0');
      // set faces directly for days, hours, minutes
      ['days','hours','minutes'].forEach(unit => {
        const container = unitContainers[unit];
        if (!container) return;
        let value;
        if (unit === 'days') value = String(days).padStart(2,'0');
        else if (unit === 'hours') value = hours;
        else value = minutes;
        const digitCards = container.querySelectorAll('.digit .flip-card');
        for (let i = 0; i < Math.min(digitCards.length, value.length); i++) {
          const front = digitCards[i].querySelector('.face.front');
          const back = digitCards[i].querySelector('.face.back');
          if (front) front.textContent = value[i];
          if (back) back.textContent = value[i];
        }
      });
    })();

    update();
    const timer = setInterval(update, 1000);
  </script>
</body>
</html>
